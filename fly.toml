app = "carim"
primary_region = "ams"

[env]
  PYTHONUNBUFFERED = "1"          # logi od razu w stdout
  # Jeśli używasz Flask keep-alive na 10000 – zostaw, ale nie używaj go jako głównego procesu
  PORT = "10000"                  # opcjonalnie, jeśli Flask nasłuchuje

[build]
  builder = "paketobuildpacks/builder-jammy-full:latest"

# To nadpisuje domyślny start buildpacka (flask run → python main.py)
[processes]
  app = "python main.py"

[experimental]
  auto_rollback = true
