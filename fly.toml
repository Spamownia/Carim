app = "carim"                  # Twoja nazwa app z fly launch
primary_region = "ams"         # lub Twój region, np. "fra" dla Frankfurt

[build]
  builder = "paketobuildpacks/builder-jammy-full:latest"  # lub pomiń jeśli używasz Dockera

[env]
  PORT = "10000"               # Flask nadal nasłuchuje, ale nie używany publicznie

# Brak [[services]] i [http_service] → zero publicznych portów, zero auto health checków na 8080

[processes]
  app = "python main.py"       # opcjonalnie, jeśli chcesz nazwać proces

[experimental]
  auto_rollback = true
