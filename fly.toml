# fly.toml

app = "carim-y-nntg"
primary_region = "ams"

[build]
  builder = "paketobuildpacks/builder:base"   # zalecane dla Python + requirements.txt

[env]
  PYTHONUNBUFFERED = "1"

# Brak [http_service] → nie będzie health-checków ani publicznego portu
# To jest kluczowa zmiana – Twój bot to worker, nie serwis HTTP

[processes]
  app = "python main.py"

[deploy]
  strategy = "bluegreen"          # lub "rolling" – bluegreen jest bezpieczniejsze
  release_command = ""            # jeśli nie masz migracji

# Żeby maszyna nie wyłączała się po idle
auto_stop_machines  = false
auto_start_machines = true
min_machines_running = 1
