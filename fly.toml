app = "carim"
primary_region = "ams"

[env]
  PYTHONUNBUFFERED = "1"                # logi od razu widoczne
  # Jeśli bot potrzebuje portu (rzadko), ale Flask keep-alive na 10000 → zostaw
  PORT = "10000"                        # ale nie używaj [[services]] poniżej!

[build]
  builder = "paketobuildpacks/builder-jammy-full:latest"

# To jest kluczowe – wymusza start dokładnie Twoim poleceniem
[processes]
  app = "python main.py"

# ŻADNEGO [[services]] ani [http_service] – bot Discord NIE potrzebuje publicznego HTTP!
# Jeśli masz, usuń całkowicie – inaczej Fly oczekuje nasłuchu na 8080 i crashuje

[experimental]
  auto_rollback = true
