# fly.toml

app = "carim-y-nntg"           # ← Twoja nazwa aplikacji – nie zmieniaj jeśli to jest poprawne
primary_region = "ams"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PYTHONUNBUFFERED = "1"

[processes]
  app = "python main.py"       # ← TO JEST NAJWAŻNIEJSZA LINIA – uruchamia Twój skrypt zamiast flask run

# Maszyna ma cały czas działać (background worker / bot)
auto_stop_machines  = false
auto_start_machines = true
min_machines_running = 1

# Opcjonalnie – jeśli chcesz mieć SSH do debugowania
[experimental]
  allowed_public_ports = [22]
