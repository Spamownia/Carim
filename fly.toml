# fly.toml – wersja z http_service (żeby dashboard pokazywał zielone "healthy")

app = "carim-y-nntg"
primary_region = "ams"

[env]
  PYTHONUNBUFFERED = "1"
  PORT = "10000"               # musi być taki sam jak w kodzie

[processes]
  app = "python main.py"

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

  [[services.http_checks]]
    path = "/health"
    grace_period = "15s"
    interval = "30s"
    timeout = "10s"
    method = "GET"
