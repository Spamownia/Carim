# fly.toml – czysta wersja dla background workera (bez publicznego portu)

app = "carim-y-nntg"
primary_region = "ams"

[build]
  builder = "paketobuildpacks/builder:base"   # jeśli używasz buildpacków Python

[env]
  PYTHONUNBUFFERED = "1"                      # logi natychmiast w stdout

[processes]
  app = "python main.py"                      # Twój jedyny proces – nazwa "app" jest domyślna i OK

# Maszyna ma działać non-stop
auto_stop_machines  = false
auto_start_machines = true
min_machines_running = 1

# Opcjonalnie – mniejszy VM, jeśli nie potrzebujesz dużo zasobów
[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"
