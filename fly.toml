# fly.toml – wersja z serwisem (żeby dashboard był zielony)

app = "carim-y-nntg"
primary_region = "ams"

[env]
  PYTHONUNBUFFERED = "1"
  PORT = "10000"                              # MUSI być taki sam jak w kodzie Flask

[processes]
  app = "python main.py"

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

  [[services.http_checks]]
    path = "/health"
    grace_period = "20s"
    interval = "60s"
    timeout = "10s"
    method = "GET"
