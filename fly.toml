app = "carim-zwqfmw"
primary_region = "ams"

[env]
  PYTHONUNBUFFERED = "1"

# Wyłącz automatyczne health-checki i proxy – bot nie nasłuchuje na 8080
[http_service]
  internal_port = 0          # lub usuń całą sekcję [http_service]
  force_https = false
  auto_stop_machines = false # opcjonalnie – żeby nie wyłączało po idle

# Ewentualnie – wyłącz auto_stop jeśli chcesz, żeby zawsze działało
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[processes]
  app = "python main.py"     # jeśli używasz buildpacków
